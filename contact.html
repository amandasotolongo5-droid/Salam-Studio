<section class="section">
  <h2>Contact Me</h2>

  <form action="https://formspree.io/f/mkopgdwg" method="POST"> 
      <label for="email">Your Email</label>
    <input id="email" type="email" name="email" required style="width:100%; padding:10px; margin:10px 0;">

    <label for="Description">Description</label>
    <input id="name" type="text" name="name" required style="width:100%; padding:10px; margin:10px 0;">

  
    <label for="message">Your Message</label>
    <textarea id="message" name="message" rows="5" required style="width:100%; padding:10px; margin:10px 0;"></textarea>

   <!-- Honeypot field (spam protection) -->
  <input type="text" name="_gotcha" style="display:none">

  <button type="submit" class="button">Send Message</button>
</form>
  <p id="form-status" style="margin-top:10px;"></p>
</form>
